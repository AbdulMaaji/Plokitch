<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD700" />
      <stop offset="100%" stop-color="#B8860B" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="2" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background Shape: Hexagon/Plate hybrid -->
  <path d="M60 10 L105 35 L105 85 L60 110 L15 85 L15 35 Z" fill="#0A0A0A" stroke="url(#goldGradient)" stroke-width="2" />
  
  <!-- Map Pin + Utensils Hybrid -->
  <path d="M60 25 C45 25 35 35 35 50 C35 65 60 90 60 90 C60 90 85 65 85 50 C85 35 75 25 60 25Z" fill="url(#goldGradient)" filter="url(#glow)" />
  
  <!-- Negative Space Utensils inside Pin -->
  <path d="M55 42 L55 58 M65 42 L65 58 M52 42 Q60 38 68 42" stroke="#0A0A0A" stroke-width="3" stroke-linecap="round" />
  <circle cx="60" cy="50" r="12" stroke="#0A0A0A" stroke-width="2" fill="none" />
  <path d="M60 50 L60 65" stroke="#0A0A0A" stroke-width="3" stroke-linecap="round" />
  
  <!-- Accent Dots -->
  <circle cx="60" cy="110" r="3" fill="url(#goldGradient)" />
</svg>
