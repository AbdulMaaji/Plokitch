name: Plokitch Architecture Enforcement

on:
  pull_request:
  push:
    branches: [main]

jobs:
  architecture-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Run Architecture Guard
        run: node scripts/architecture-check.js
